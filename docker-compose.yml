services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: geojobs
      POSTGRES_USER: geojobs
      POSTGRES_PASSWORD: geojobs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geojobs"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=True
      - DATA_SOURCE=json
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - POSTGRES_DB=geojobs
      - POSTGRES_USER=geojobs
      - POSTGRES_PASSWORD=geojobs
      - POSTGRES_HOST=db
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
